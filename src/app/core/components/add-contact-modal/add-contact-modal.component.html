<div class="modal-header">
   <h5 class="modal-title">Add Contact</h5>
   <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss('cancel')"></button>
</div>


<div class="modal-body">
   <form #contactFormNg="ngForm" (ngSubmit)="addContact(contactFormNg)" novalidate>
      <div class="alert alert-light">


         <div class="row g-2">
            <div class="col-6">
               <label class="form-label" for="contact-name">
                  Client
               </label>
               <div class="form-control form-control-sm" id="contact-client" readonly>{{ project.clientName }}</div>
            </div>
            <div class="col-6">
               <label class="form-label" for="contact-name">
                  Project
               </label>
               <div class="form-control form-control-sm" id="contact-project" readonly>{{ project.name }}</div>
            </div>
            <div class="col-12">
               <label class="form-label" for="contact-name">
                  Full Name <span class="text-danger">*</span>
               </label>
               <div class="row g-2">
                  <div class="col-6">
                     <input id="contact-name" class="form-control form-control-sm" name="firstName"
                        [(ngModel)]="formModel.firstName" #firstNameNgModel="ngModel" placeholder="First Name"
                        [class.is-invalid]="firstNameNgModel.invalid && (firstNameNgModel.touched || contactFormNg.submitted)"
                        required />
                  </div>
                  <div class="col-6">
                     <input id="contact-last-name" class="form-control form-control-sm" name="lastName"
                        [(ngModel)]="formModel.lastName" #lastNameNgModel="ngModel" placeholder="Last name" />
                  </div>
               </div>

               <div class="invalid-feedback">First and last name are required.</div>
            </div>

            <div class="col-12 col-md-6">
               <label class="form-label" for="contact-email">
                  Email <span class="text-danger">*</span>
               </label>
               <input id="contact-email" class="form-control form-control-sm" type="email" name="email"
                  [(ngModel)]="formModel.email" #emailNgModel="ngModel"
                  [class.is-invalid]="emailNgModel.invalid && (emailNgModel.touched || contactFormNg.submitted)"
                  required email />
               <div class="invalid-feedback">Valid email is required.</div>
            </div>

            <div class="col-12 col-md-6">
               <label class="form-label" for="contact-phone">
                  Phone
               </label>
               <input id="contact-phone" class="form-control form-control-sm" name="phone" [(ngModel)]="formModel.phone"
                  #phoneNgModel="ngModel"
                  [class.is-invalid]="phoneNgModel.invalid && (phoneNgModel.touched || contactFormNg.submitted)" />
               <div class="invalid-feedback">Phone is required.</div>
            </div>
         </div>
         <div class="mt-3 d-flex justify-content-end gap-2">

            <button type="submit" class="btn btn-sm btn-success" [disabled]="contactFormNg.invalid || saving">
               {{ saving ? 'Saving...' : 'New Contact' }}
            </button>
         </div>
      </div>
   </form>

   <div>
      <table class="table table-sm mt-3">
         <thead>
            <tr>
               <th scope="col">#</th>
               <th></th>
               <th scope="col">Name</th>
               <th scope="col">Email</th>
               <th scope="col">Phone</th>
            </tr>
         </thead>
         <tbody>
            <tr *ngFor="let contact of listContacts; let i = index" [ngClass]="{ 'table-disabled': contact.existing }">
               <td scope="row">{{ i + 1 }}</td>
               @if(!contact.existing) {
               <td (click)="contact.checkbox = !contact.checkbox" style="cursor: pointer;">

                  <i class="bi bi-check-square" *ngIf="contact.checkbox"></i>
                  <i class="bi bi-square" *ngIf="!contact.checkbox"></i>
               </td>
               }
               @else {
               <td>
                  <i class="bi bi-check-square-fill"></i>
               </td>
               }
               <td>{{ contact.name }} </td>
               <td>{{ contact.email }}</td>
               <td>{{ contact.phone }}</td>
            </tr>
         </tbody>
      </table>
   </div>
</div>

<div class="modal-footer">
   <button type="button" class="btn btn-sm btn-outline-secondary" (click)="activeModal.dismiss('cancel')">
      Cancel
   </button>
   <button type="button" class="btn btn-sm btn-primary" (click)="addContactFromList()">
      {{ saving ? 'Saving...' : 'Add Contact' }}
   </button>
</div>
