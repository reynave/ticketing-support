<div class="page-login">
  <div class="login-card">
    <div class="brand-icon">
      <i class="bi bi-headset"></i>
    </div>

    <h1>HelpDesk Portal</h1>
    <p class="subtitle">Sign in to manage your support tickets</p>

    <div class="alert-info-custom d-flex gap-2 align-items-start mb-3">
      <i class="bi bi-info-circle-fill mt-1 flex-shrink-0"></i>
      <span>Demo: use <strong>admin&#64;thinktank.local</strong> / <strong>Admin123!</strong></span>
    </div>

    @if (errorMessage) {
      <div class="alert alert-danger py-2 px-3 small mb-3">{{ errorMessage }}</div>
    }

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 border form-icon-left">
            <i class="bi bi-envelope text-secondary form-icon"></i>
          </span>
          <input
            type="email"
            class="form-control border-start-0"
            name="email"
            [(ngModel)]="formModel.email"
            placeholder="nama@perusahaan.com"
            required
            email
          />
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 border form-icon-left">
            <i class="bi bi-lock text-secondary form-icon"></i>
          </span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-control border-start-0"
            name="password"
            [(ngModel)]="formModel.password"
            placeholder="Enter password"
            required
          />
          <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
            <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'" class="form-icon"></i>
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember" name="remember" [(ngModel)]="formModel.remember" />
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <span class="forgot-link">Forgot password?</span>
      </div>

      <button type="submit" class="btn btn-login btn-primary w-100" [disabled]="loading">
        <i class="bi bi-box-arrow-in-right me-2"></i>
        {{ loading ? 'Processing...' : 'Sign In' }}
      </button>
    </form>

    <p class="footer-text">&copy; 2026 HelpDesk System. All rights reserved.</p>
  </div>
</div>
